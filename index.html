<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>固定拼圖遊戲</title>

<style>
:root {
  --theme-color: red;
}

body{
  font-family:sans-serif;
  text-align:center;
}

/* 關卡與音樂控制區樣式 */
.game-ctrl {
  margin: 15px auto;
  font-size: 1.2rem;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
}
.level-btn, .audio-btn {
  padding: 6px 15px;
  font-size: 1rem;
  cursor: pointer;
  border: none;
  border-radius: 4px;
  color: white;
}
.level-btn {
  background-color: #4CAF50;
}
.level-btn:disabled {
  background-color: #ccc;
  cursor: not-allowed;
}
.audio-btn {
  background-color: #555;
}

/* ================= 拼圖顯示區域尺寸規劃 ================= */

/* 1. 基礎網格與目標圖案 (保持原尺寸 70px) */
.grid{
  display:grid;
  grid-template-columns:repeat(4,70px);
  gap:4px;
  justify-content:center;
  margin:20px;
}
.cell{
  width:70px;
  height:70px;
  border:1px solid #ccc;
  background:#f9f9f9;
}
.piece{
  width:70px;
  height:70px;
  cursor:grab;
}

/* 2. 拼圖區 (#pieces)：拼片放大 1.5 倍 (105px) */
#pieces {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px; /* 稍微加大間距 */
  margin: 15px auto;
  max-width: 600px;
}
#pieces .piece {
  width: 105px;  /* 70px * 1.5 = 105px */
  height: 105px;
}

/* 3. 拼砌區 (#board)：獨立放大 2 倍 (140px) */
#board {
  grid-template-columns: repeat(4, 140px);
  gap: 6px;
}
#board .cell {
  width: 140px;
  height: 140px;
}
/* 當拼片被拖放到拼砌區時，自動放大至 2 倍填滿格子 */
#board .piece {
  width: 100%;
  height: 100%;
}

/* 四種方向（固定，不可轉） */
.dir0{ background:linear-gradient(135deg, var(--theme-color) 50%, white 50%); }
.dir1{ background:linear-gradient(225deg, var(--theme-color) 50%, white 50%); }
.dir2{ background:linear-gradient(315deg, var(--theme-color) 50%, white 50%); }
.dir3{ background:linear-gradient(45deg, var(--theme-color) 50%, white 50%); }

</style>
</head>

<body>

<h2>🧠 拼圖遊戲（固定方向）</h2>

<div class="game-ctrl">
  <span>目前關卡: <strong id="current-level-val">1</strong> / 50</span>
  <button id="next-level-btn" class="level-btn" disabled onclick="nextLevel()">下一關</button>
  <button id="audio-toggle-btn" class="audio-btn" onclick="toggleAudio()">🎵 音樂：關</button>
</div>

<h3>目標圖案</h3>
<div id="target" class="grid"></div>

<h3>🧩 拼圖區（放大 1.5 倍）</h3>
<div id="pieces"></div>

<h3>🧩 拼砌區（放大 2 倍）</h3>
<div id="board" class="grid"></div>

<audio id="bg-music" loop src="https://assets.mixkit.co/music/preview/mixkit-games-world-beaten-1229.mp3"></audio>
<audio id="win-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chime-2015.mp3"></audio>

<script>
// ===== 關卡與主題設定 =====
let currentLevel = 1;
const totalLevels = 50;
const themeColors = ["red", "#ff6b00", "#2ed573", "#1e90ff", "#9b59b6"];
let answer = [];

// ===== 音樂控制變數 =====
let isAudioOn = false;
const bgMusic = document.getElementById("bg-music");
const winSound = document.getElementById("win-sound");

function toggleAudio() {
  isAudioOn = !isAudioOn;
  const btn = document.getElementById("audio-toggle-btn");
  
  if (isAudioOn) {
    btn.innerText = "🎵 音樂：開";
    btn.style.backgroundColor = "#e67e22";
    bgMusic.play().catch(err => console.log("瀏覽器阻擋自動播放"));
  } else {
    btn.innerText = "🎵 音樂：關";
    btn.style.backgroundColor = "#555";
    bgMusic.pause();
  }
}

// ===== 初始化關卡功能 =====
function loadLevel(level) {
  let colorIndex = Math.floor((level - 1) / 10);
  if (colorIndex >= themeColors.length) colorIndex = themeColors.length - 1;
  document.documentElement.style.setProperty('--theme-color', themeColors[colorIndex]);
  
  document.getElementById("current-level-val").innerText = level;
  document.getElementById("next-level-btn").disabled = true;

  // 動態生成隨機目標答案
  answer = [];
  for (let i = 0; i < 16; i++) {
    answer.push(Math.floor(Math.random() * 4));
  }

  // 清空並生成目標圖 (維持 70px)
  const target = document.getElementById("target");
  target.innerHTML = "";
  answer.forEach(dir => {
    let c = document.createElement("div");
    c.className = "cell";
    let p = document.createElement("div");
    p.className = "piece dir" + dir;
    c.appendChild(p);
    target.appendChild(c);
  });

  // 清空並生成玩家拼砌區 (140px)
  const board = document.getElementById("board");
  board.innerHTML = "";
  for (let i = 0; i < 16; i++) {
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.index = i;
    cell.ondragover = e => e.preventDefault();
    cell.ondrop = drop;
    board.appendChild(cell);
  }

  // 清空並生成打亂拼件 (透過 CSS 控制在拼圖區顯示為 105px)
  const piecesDiv = document.getElementById("pieces");
  piecesDiv.innerHTML = "";
  
  let pieces = [...answer];
  pieces.sort(() => Math.random() - 0.5);

  pieces.forEach((dir, i) => {
    let p = document.createElement("div");
    p.className = "piece dir" + dir;
    p.id = "p" + i;
    p.dataset.dir = dir;
    p.draggable = true;
    p.ondragstart = drag;
    piecesDiv.appendChild(p);
  });
}

// ===== 下一關 =====
function nextLevel() {
  if (currentLevel < totalLevels) {
    currentLevel++;
    loadLevel(currentLevel);
  } else {
    alert("恭喜你！已成功通關全部 50 個關卡！🎉");
  }
}

// ===== 拖放邏輯 =====
function drag(e){
  e.dataTransfer.setData("id", e.target.id);
}

function drop(e){
  e.preventDefault();
  let id = e.dataTransfer.getData("id");
  let piece = document.getElementById(id);

  if(e.target.classList.contains("cell") && e.target.children.length === 0){
    e.target.appendChild(piece);
    checkWin();
  } 
  else if(e.target.classList.contains("piece") && e.target.parentElement.children.length === 1) {
    e.target.parentElement.appendChild(piece);
    checkWin();
  }
}

// ===== 勝利判斷 =====
function checkWin(){
  let cells = document.querySelectorAll("#board .cell");
  let correct = true;

  cells.forEach((cell, i) => {
    if(cell.children.length === 0){
      correct = false;
      return;
    }
    let dir = parseInt(cell.children[0].dataset.dir);
    if(dir !== answer[i]){
      correct = false;
    }
  });

  if(correct){
    if (isAudioOn) {
      winSound.currentTime = 0;
      winSound.play();
    }

    setTimeout(() => {
      alert("🎉 完成第 " + currentLevel + " 關拼圖！");
      document.getElementById("next-level-btn").disabled = false;
      
      if (currentLevel === totalLevels) {
        alert("太厲害了！你已經完成了全部 50 關的終極挑戰！👑");
      }
    }, 100);
  }
}

// ===== 啟動遊戲 =====
window.onload = function() {
  loadLevel(currentLevel);
};
</script>

</body>
</html>
